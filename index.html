<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clenomantra</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet"><style>
body {margin:0; font-family:Montserrat; background:#f4f7fb}

/* NAV */
.nav{
display:flex; justify-content:space-between; align-items:center;
padding:15px 20px; background:#0b3a82; color:white;
}
.nav img{height:40px}

/* HERO */
.hero{
text-align:center; color:white;
padding:60px 20px;
background:linear-gradient(135deg,#0b3a82,#0f5bd3);
}
.hero h1{font-size:40px}

/* GRID */
.section{padding:40px 20px; text-align:center}
.grid{
display:grid; grid-template-columns:1fr; gap:20px;
max-width:1200px; margin:auto;
}

/* CARD */
.card{
background:white; padding:15px; border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover{
transform:translateY(-8px);
}
.card img{
width:100%; height:180px; object-fit:contain;
}

/* ORDER */
select,button{
width:100%; padding:10px; margin-top:8px;
border-radius:8px;
}
button{
background:#0b3a82; color:white; border:none; font-weight:bold;
}

/* CART */
.cart{
position:fixed; bottom:20px; left:20px;
background:#0b3a82; color:white;
padding:15px; border-radius:12px;
}

/* FOOTER */
.footer{
background:#0b3a82; color:white;
text-align:center; padding:15px;
margin-top:20px;
}

@media(min-width:768px){
.grid{grid-template-columns:repeat(4,1fr)}
}
</style></head><body><!-- NAV --><div class="nav">
<img src="LOGO.png">
</div><!-- HERO --><div class="hero">
<h1>CLENOMANTRA</h1>
<p>Har Drop Me Safai Ka Mantra</p>
<img src="banner1.png" style="width:100%;max-width:900px">
</div><!-- PRODUCTS --><div class="section">
<h2>Our Products</h2><div class="grid"><!-- FLOOR --><div class="card">
<img src="Product1.png">
<h3>Floor Cleaner</h3>
<select id="f">
<option value="40">250ml - ₹40</option>
<option value="60">500ml - ₹60</option>
<option value="80">750ml - ₹80</option>
<option value="100">1L - ₹100</option>
</select>
<select id="fq">
<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
</select>
<button onclick="add('Floor Cleaner','f','fq')">Add</button>
</div><!-- TOILET --><div class="card">
<img src="product2.png">
<h3>Toilet Cleaner</h3>
<select id="t">
<option value="30">250ml - ₹30</option>
<option value="50">500ml - ₹50</option>
<option value="75">750ml - ₹75</option>
<option value="100">1L - ₹100</option>
</select>
<select id="tq">
<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
</select>
<button onclick="add('Toilet Cleaner','t','tq')">Add</button>
</div><!-- DISHWASH --><div class="card">
<img src="product3.png">
<h3>Dishwash Liquid</h3>
<select id="d">
<option value="30">250ml - ₹30</option>
<option value="50">500ml - ₹50</option>
<option value="70">750ml - ₹70</option>
<option value="90">1L - ₹90</option>
</select>
<select id="dq">
<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
</select>
<button onclick="add('Dishwash','d','dq')">Add</button>
</div><!-- DETERGENT --><div class="card">
<img src="product4.png">
<h3>Top Load Liquid</h3>
<select id="de">
<option value="30">250g - ₹30</option>
<option value="50">500g - ₹50</option>
<option value="85">1kg - ₹85</option>
<option value="250">4kg - ₹250</option>
</select>
<select id="deq">
<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
</select>
<button onclick="add('Detergent','de','deq')">Add</button>
</div></div>
</div><!-- CART --><div class="cart">
🛒 Total: <span id="total">₹0</span><br>
<button onclick="checkout()">Checkout</button>
</div><!-- FOOTER --><div class="footer">
© Clenomantra
</div><!-- SCRIPT --><script>

let cart = [];
let total = 0;

function add(product, sizeId, qtyId){

let sizeSelect = document.getElementById(sizeId);
let qtySelect = document.getElementById(qtyId);

let sizeText = sizeSelect.options[sizeSelect.selectedIndex].text;
let price = parseInt(sizeSelect.value);
let qty = parseInt(qtySelect.value);

let amount = price * qty;

// STORE FULL DETAILS
cart.push({
product: product,
size: sizeText,
price: price,
qty: qty,
amount: amount
});

// TOTAL UPDATE
total += amount;
document.getElementById("total").innerText = "₹" + total;

}

function checkout(){

let msg = "🛒 Order Details\n\n";

cart.forEach((item,index)=>{

msg += `${index+1}. ${item.product}\n`;
msg += `📦 Size: ${item.size}\n`;
msg += `💰 Rate: ₹${item.price}\n`;
msg += `🔢 Quantity: ${item.qty}\n`;
msg += `🧾 Amount: ₹${item.amount}\n\n`;

});

msg += "----------------------\n";
msg += "Total: ₹" + total;

let url = "https://wa.me/919713545556?text=" + encodeURIComponent(msg);

window.open(url);

}

</script></body>
</html>
