<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clenomantra</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Montserrat; background:#fff; }

/* NAV */
.nav {
display:flex; justify-content:space-between;
padding:15px 20px; background:#0b3a82;
}
.nav img { height:45px; }
.nav a {
background:#22c55e; padding:10px 18px;
border-radius:30px; color:#fff; text-decoration:none;
}

/* HERO */
.hero {
background:#0b3a82; color:#fff;
text-align:center; padding:60px 20px;
}
.brand {
font-size:52px;
font-weight:800;
background:linear-gradient(90deg,#fff,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.banner img {
width:100%; max-width:1100px;
border-radius:20px;
margin-top:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* PRODUCTS */
.section { padding:60px 20px; text-align:center; }

.grid {
display:grid;
grid-template-columns:1fr;
gap:25px;
max-width:1200px;
margin:auto;
}

.card {
background:#f4f7fb;
padding:20px;
border-radius:15px;
}

.card img { height:200px; width:100%; object-fit:contain; }

/* ORDER */
.order-box {
display:flex;
flex-direction:column;
gap:10px;
}

select, button {
padding:10px;
border-radius:8px;
}

button {
background:#0b3a82;
color:white;
font-weight:bold;
border:none;
}

/* CART */
.cart {
position:fixed;
bottom:20px;
left:20px;
background:#0b3a82;
color:white;
padding:15px;
border-radius:10px;
}

/* CONTACT */
.contact {
background:#f4f7fb;
padding:20px;
max-width:500px;
margin:auto;
border-radius:15px;
}

/* FOOTER */
.footer {
background:#0b3a82;
color:white;
text-align:center;
padding:15px;
}

@media(min-width:768px){
.grid{ grid-template-columns:repeat(4,1fr); }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<img src="LOGO.png">
<a href="https://wa.me/919713545556">Order Now</a>
</div>

<!-- HERO -->
<div class="hero">
<div class="brand">CLENOMANTRA</div>
<p>Har Drop Me Safai Ka Mantra</p>

<div class="banner">
<img src="Banner1.png">
</div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h2>Our Products</h2>

<div class="grid">

<!-- FLOOR -->
<div class="card">
<img src="Product1.png">
<h3>Floor Cleaner</h3>

<div class="order-box">
<select id="fsize">
<option value="25">250ml ₹25</option>
<option value="40">500ml ₹40</option>
<option value="60">750ml ₹60</option>
<option value="75">1L ₹75</option>
</select>

<select id="fqty">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="5">5</option>
</select>

<button onclick="addToCart('Floor Cleaner','fsize','fqty')">Add</button>
</div>
</div>

<!-- TOILET -->
<div class="card">
<img src="product2.png">
<h3>Toilet Cleaner</h3>

<div class="order-box">
<select id="tsize">
<option value="20">250ml ₹20</option>
<option value="35">500ml ₹35</option>
<option value="50">750ml ₹50</option>
<option value="60">1L ₹60</option>
</select>

<select id="tqty">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="5">5</option>
</select>

<button onclick="addToCart('Toilet Cleaner','tsize','tqty')">Add</button>
</div>
</div>

<!-- DISHWASH -->
<div class="card">
<img src="product3.png">
<h3>Dishwash Liquid</h3>

<div class="order-box">
<select id="dsize">
<option value="30">250ml ₹30</option>
<option value="50">500ml ₹50</option>
<option value="70">750ml ₹70</option>
<option value="90">1L ₹90</option>
</select>

<select id="dqty">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="5">5</option>
</select>

<button onclick="addToCart('Dishwash','dsize','dqty')">Add</button>
</div>
</div>

<!-- DETERGENT -->
<div class="card">
<img src="product4.png">
<h3>Detergent</h3>

<div class="order-box">
<select id="psize">
<option value="60">500g ₹60</option>
<option value="110">1kg ₹110</option>
<option value="200">2kg ₹200</option>
<option value="380">4kg ₹380</option>
</select>

<select id="pqty">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<button onclick="addToCart('Detergent','psize','pqty')">Add</button>
</div>
</div>

</div>
</div>

<!-- CART -->
<div class="cart" id="cartBox">
Total: ₹0<br>
<button onclick="checkout()">Checkout</button>
</div>

<!-- CONTACT -->
<div class="section">
<div class="contact">
<h3>Contact</h3>
<p>📍 Jalandhar</p>
<p>📞 9713545556</p>
</div>
</div>

<div class="footer">© Clenomantra</div>

<script>
let total = 0;
let orders = [];

function addToCart(product,sizeId,qtyId){
let price = parseInt(document.getElementById(sizeId).value);
let qty = parseInt(document.getElementById(qtyId).value);

let itemTotal = price * qty;
total += itemTotal;

orders.push(product + " x" + qty + " = ₹" + itemTotal);

document.getElementById("cartBox").innerHTML =
"Total: ₹" + total + "<br><button onclick='checkout()'>Checkout</button>";
}

function checkout(){
let msg = "Order Details%0A";
orders.forEach(o => msg += o + "%0A");
msg += "Total: ₹" + total;

window.open("https://wa.me/919713545556?text=" + msg);
}
</script>

</body>
</html>
